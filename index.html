<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Frentes de Trabalho</title>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4ef;--card:#fff;--border:#e8e2d8;--ink:#1a1714;
  --muted:#8c8478;--soft:#f0ece4;--sidebar:240px;
  --c1:#ff5c3a;--c7:#e63946;--cg:#34c759;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.018;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ══ LOGIN ══ */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;z-index:1}
.login-box{background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:40px 32px 36px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.login-logo{font-family:'Anybody',sans-serif;font-weight:900;font-size:28px;letter-spacing:-1px;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:8px}
.login-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--c1);animation:pulse 2.4s ease-in-out infinite}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px}
.login-inp{width:100%;background:var(--soft);border:1.5px solid var(--border);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;color:var(--ink);outline:none;padding:13px 16px;margin-bottom:14px;transition:border-color .15s}
.login-inp:focus{border-color:var(--ink)}
.login-inp::placeholder{color:var(--muted)}
.btn-login{width:100%;background:var(--ink);color:#fff;border:none;border-radius:12px;font-family:'Anybody',sans-serif;font-weight:700;font-size:18px;padding:14px;cursor:pointer;margin-top:6px;transition:background .15s;min-height:50px}
.btn-login:active{background:var(--c1)}
.login-error{color:var(--c7);font-size:13px;margin-top:10px;min-height:18px;text-align:center}

/* ══ APP SHELL ══ */
#app-screen{display:none;position:relative;z-index:1}

header{position:sticky;top:0;z-index:200;background:rgba(247,244,239,.95);backdrop-filter:blur(12px);
border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:12px}
.logo{font-family:'Anybody',sans-serif;font-weight:900;font-size:22px;letter-spacing:-1px;color:var(--ink);display:flex;align-items:center;gap:6px}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--c1);flex-shrink:0;animation:pulse 2.4s ease-in-out infinite}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--cg);flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:var(--c1);animation:pulse .8s ease-in-out infinite}
.sync-dot.error{background:var(--c7)}
.user-badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.hbtn{background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;min-height:34px}
.hbtn:hover{border-color:var(--ink);color:var(--ink)}
.hbtn.danger:hover{border-color:var(--c7);color:var(--c7)}
.hbtn.primary{background:var(--ink);color:#fff;border-color:var(--ink);font-family:'Anybody',sans-serif;font-weight:700;font-size:13px;letter-spacing:.3px;min-height:38px}
.hbtn.primary:active{background:var(--c1)}

/* ══ LAYOUT: SIDEBAR + CONTENT ══ */
.app-body{display:flex;min-height:calc(100vh - 57px)}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--card);border-right:1.5px solid var(--border);
  padding:16px 0;display:flex;flex-direction:column;
  position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;
}
.sidebar-section{padding:0 12px;margin-bottom:4px}
.sidebar-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:8px 8px 4px}
.sidebar-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:10px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--muted);
  transition:all .15s;user-select:none;
}
.sidebar-item:hover{background:var(--soft);color:var(--ink)}
.sidebar-item.active{background:var(--soft);color:var(--ink);font-weight:600}
.sidebar-item .folder-icon{font-size:14px;flex-shrink:0}
.sidebar-item .folder-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-item .folder-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0}
.sidebar-item .folder-del{opacity:0;font-size:13px;border:none;background:none;cursor:pointer;color:var(--muted);padding:0 2px;flex-shrink:0;transition:opacity .15s,color .15s}
.sidebar-item:hover .folder-del{opacity:1}
.sidebar-item .folder-del:hover{color:var(--c7)}
.btn-new-folder{display:flex;align-items:center;gap:8px;width:100%;background:none;border:1.5px dashed var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;transition:all .15s;margin:4px 0}
.btn-new-folder:hover{border-color:var(--ink);color:var(--ink)}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:8px 12px}

/* ── MAIN CONTENT ── */
.content{flex:1;min-width:0;padding:28px 24px 100px;max-width:760px}

/* ── FOLDER HEADER ── */
.folder-title-row{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.folder-title{font-family:'Anybody',sans-serif;font-weight:900;font-size:28px;letter-spacing:-1px;color:var(--ink)}
.folder-title-muted{color:var(--muted)}

/* ── LOADING / EMPTY ── */
.loading-state{text-align:center;padding:80px 0;color:var(--muted)}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--c1);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
.empty{text-align:center;padding:60px 0}
.empty-big{font-family:'Anybody',sans-serif;font-weight:900;font-size:clamp(48px,15vw,80px);letter-spacing:-3px;line-height:1;color:var(--border);margin-bottom:16px}
.empty-sub{font-size:15px;color:var(--muted)}

/* ── DRAG & DROP ── */
.drag-placeholder{background:var(--soft);border:2px dashed var(--c1);border-radius:12px;margin-bottom:16px;transition:all .15s}
.dragging-ghost{opacity:.35}
.drag-handle{
  cursor:grab;color:var(--muted);font-size:16px;padding:4px 6px;
  flex-shrink:0;touch-action:none;user-select:none;line-height:1;
  border-radius:4px;-webkit-user-select:none;
}
.drag-handle:hover{background:var(--soft);color:var(--ink);cursor:grab}
.drag-handle:active{cursor:grabbing}
.drag-clone{position:fixed;z-index:9999;pointer-events:none;opacity:.92;box-shadow:0 8px 32px rgba(0,0,0,.18);border-radius:12px;background:var(--card);border:1.5px solid var(--c1);padding:8px 14px;font-family:'Anybody',sans-serif;font-weight:700;font-size:14px;color:var(--ink);max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── FRENTE CARD ── */
.frente-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;margin-bottom:16px;overflow:visible;transition:box-shadow .2s,opacity .2s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.frente-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.08)}
.frente-card-inner{border-radius:20px;overflow:hidden}
.frente-card::before{content:'';display:block;height:5px;background:var(--fc,var(--c1));border-radius:20px 20px 0 0}
.frente-header{display:flex;align-items:center;gap:12px;padding:16px 16px 12px;cursor:pointer}
.frente-info{flex:1;min-width:0}
.ftag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.frente-name-row{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap}
.fcaret{font-size:18px;color:var(--muted);transition:transform .28s;flex-shrink:0;padding:4px}
.fcaret.open{transform:rotate(180deg)}
.fdel{background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.fdel:active{border-color:var(--c7);color:var(--c7)}
.frente-body{display:none;padding:0 16px 20px}
.frente-body.open{display:block}

/* move-to-folder button */
.btn-move-folder{background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-move-folder:hover{border-color:var(--ink);color:var(--ink)}

/* ── EDITABLE TEXTAREA ── */
.editable-wrap{display:flex;align-items:flex-start;gap:6px;flex:1;min-width:0}
.editable-name{
  font-family:inherit;font-weight:inherit;font-size:inherit;letter-spacing:inherit;color:inherit;
  background:none;border:none;outline:none;padding:2px 4px;border-radius:6px;cursor:pointer;
  transition:background .15s;width:100%;min-width:0;
  resize:none;overflow:hidden;line-height:inherit;
  white-space:pre-wrap;word-break:break-word;
  field-sizing:content; /* auto-grow */
}
.editable-name:hover{background:rgba(0,0,0,.05)}
.editable-name:focus{background:rgba(0,0,0,.06);cursor:text;outline:2px solid var(--fc,var(--c1));outline-offset:1px}

/* ── DESC BUTTON ── */
.btn-desc{background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;cursor:pointer;padding:3px 8px;flex-shrink:0;transition:all .15s;white-space:nowrap;font-family:'JetBrains Mono',monospace;line-height:1.5;opacity:.6;margin-top:2px}
.btn-desc:hover{opacity:1;border-color:var(--fc,var(--c1));color:var(--fc,var(--c1))}
.btn-desc.has-desc{opacity:1;border-color:var(--fc,var(--c1));color:var(--fc,var(--c1));padding:3px 7px;font-size:13px}

/* ── DESC SHEET ── */
.overlay2{display:none;position:fixed;inset:0;background:rgba(26,23,20,.55);z-index:600;align-items:flex-end;justify-content:center}
.overlay2.open{display:flex}
.desc-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:28px 24px 44px;animation:slideUp .22s cubic-bezier(.3,1.3,.5,1);position:relative;max-height:80vh;overflow-y:auto}
.desc-sheet::before{content:'';display:block;width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 24px}
.desc-sheet-title{font-family:'Anybody',sans-serif;font-weight:700;font-size:20px;margin-bottom:16px;color:var(--ink)}
.desc-tag-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
.desc-textarea{width:100%;background:var(--soft);border:1.5px solid var(--border);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--ink);outline:none;padding:14px;resize:vertical;min-height:120px;transition:border-color .15s;line-height:1.6}
.desc-textarea:focus{border-color:var(--ink)}
.desc-textarea::placeholder{color:var(--muted)}
.desc-footer{display:flex;gap:10px;margin-top:16px}
.btn-desc-cancel{flex:1;background:var(--soft);border:1.5px solid var(--border);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:15px;padding:13px;cursor:pointer;color:var(--muted);min-height:48px}
.btn-desc-save{flex:2;background:var(--ink);color:#fff;border:none;border-radius:12px;font-family:'Anybody',sans-serif;font-weight:700;font-size:18px;padding:13px;cursor:pointer;min-height:48px}
.btn-desc-save:active{background:var(--c1)}
.btn-close-sheet{position:absolute;top:20px;right:20px;background:var(--soft);border:none;border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}

/* ── TRILHA ── */
.trilhas-list{display:flex;flex-direction:column;gap:14px;margin-top:10px}
.trilha-card{background:var(--card);border:1.5px solid var(--border);border-left:4px solid var(--fc,var(--c1));border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.trilha-header{display:flex;align-items:center;gap:12px;padding:14px 14px 12px;cursor:pointer;background:linear-gradient(90deg,color-mix(in srgb,var(--fc,var(--c1)) 8%,transparent),transparent 60%)}
.trilha-ring{flex-shrink:0;position:relative;width:52px;height:52px}
.trilha-ring svg{display:block}
.trilha-ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.trilha-ring-pct{font-family:'Anybody',sans-serif;font-weight:900;font-size:13px;color:var(--ink);line-height:1}
.trilha-ring-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:1px}
.trilha-ring.all-done .trilha-ring-pct,.trilha-ring.all-done .trilha-ring-sub{display:none}
.trilha-ring-check{font-size:16px;display:none}
.trilha-ring.all-done .trilha-ring-check{display:block}
.trilha-info{flex:1;min-width:0}
.trilha-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--fc,var(--c1));margin-bottom:4px;font-weight:500}
.trilha-name-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.trilha-editable{font-family:'Anybody',sans-serif;font-weight:900;font-size:clamp(16px,3.5vw,20px);letter-spacing:-.3px;line-height:1.2;color:var(--ink)}
.trilha-caret{font-size:15px;color:var(--muted);transition:transform .25s;flex-shrink:0;padding:5px}
.trilha-caret.open{transform:rotate(180deg)}
.trilha-del{background:none;border:1.5px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.trilha-del:active{border-color:var(--c7);color:var(--c7)}
.trilha-body{display:none;padding:4px 14px 16px;border-top:1px solid var(--border)}
.trilha-body.open{display:block}

/* ── ETAPA ── */
.etapas-list{display:flex;flex-direction:column;gap:0;margin-top:8px}
.etapa-wrap{position:relative}
.etapa-wrap::before{content:'';position:absolute;left:19px;top:46px;bottom:-2px;width:1.5px;background:var(--border);z-index:0}
.etapa-wrap:last-child::before{display:none}
.etapa-wrap.done::before{background:color-mix(in srgb,var(--fc,var(--c1)) 40%,transparent)}
.etapa-row{display:flex;align-items:flex-start;gap:10px;padding:8px 6px 8px 0;position:relative;z-index:1;border-radius:10px;transition:background .15s;cursor:pointer}
.etapa-row:hover{background:var(--soft)}
.etapa-ring{flex-shrink:0;position:relative;width:40px;height:40px;margin-top:2px}
.etapa-ring svg{display:block}
.etapa-ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.etapa-ring-pct{font-family:'Anybody',sans-serif;font-weight:700;font-size:9px;color:var(--muted)}
.etapa-ring.all-done .etapa-ring-pct{display:none}
.etapa-ring-check2{font-size:11px;display:none}
.etapa-ring.all-done .etapa-ring-check2{display:block}
.etapa-info{flex:1;min-width:0}
.etapa-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1px}
.etapa-name-row{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap}
.etapa-editable{font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:clamp(13px,3vw,15px);line-height:1.4;color:var(--ink)}
.etapa-wrap.done .etapa-editable{color:var(--muted);text-decoration:line-through}
.etapa-sub-hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px}
.etapa-actions{display:flex;gap:4px;align-items:center;flex-shrink:0;margin-top:2px}
.etapa-caret{font-size:16px;color:var(--muted);transition:transform .22s;flex-shrink:0;padding:5px;cursor:pointer;background:var(--soft);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.etapa-caret.open{transform:rotate(180deg);background:var(--border)}
.btn-sm{background:none;border:1.5px solid var(--border);border-radius:6px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 8px;cursor:pointer;transition:all .15s;min-height:30px}
.btn-sm:active{border-color:var(--c7);color:var(--c7)}

/* ── SUBETAPAS ── */
.subetapas-panel{display:none;margin:2px 0 8px 58px;background:var(--card);border-radius:12px;padding:8px 10px;border:1.5px solid var(--border);animation:fadeDown .18s ease}
.subetapas-panel.open{display:block}
.sub-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.sub-item:last-of-type{border-bottom:none}
.sub-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--soft);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;margin-top:1px}
.sub-check.done{background:var(--fc,var(--c1));border-color:var(--fc,var(--c1))}
.sub-check.done::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.sub-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:26px;flex-shrink:0;margin-top:3px}
.sub-name-row{flex:1;display:flex;align-items:flex-start;gap:6px;min-width:0}
.sub-editable{font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;color:var(--ink);line-height:1.4}
.sub-item.done .sub-editable{color:var(--muted);text-decoration:line-through}
.sub-del{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;min-width:28px;min-height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;margin-top:1px}
.sub-del:active{color:var(--c7)}
.add-sub-row{display:flex;align-items:center;gap:8px;padding:8px 0 2px}
.ghost-check{width:22px;height:22px;border-radius:50%;border:2px dashed var(--border);flex-shrink:0}
.sub-inp{flex:1;background:none;border:none;border-bottom:1.5px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;padding:4px 0;min-width:0;transition:border-color .15s}
.sub-inp::placeholder{color:var(--muted)}
.sub-inp:focus{border-color:var(--fc,var(--c1))}
.btn-add-sub{background:var(--fc,var(--c1));color:#fff;border:none;border-radius:8px;font-family:'Anybody',sans-serif;font-weight:700;font-size:15px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.btn-add-sub:active{opacity:.75}

/* ── ADD ROWS ── */
.btn-add-row{display:flex;align-items:center;gap:10px;width:100%;margin-top:10px;background:transparent;border:1.5px dashed var(--border);border-radius:12px;padding:11px 14px;cursor:pointer;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;transition:all .2s;min-height:44px}
.btn-add-row:active{border-color:var(--fc,var(--c1));color:var(--fc,var(--c1))}
.add-plus{width:20px;height:20px;border-radius:50%;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.input-row{display:none;align-items:center;gap:8px;margin-top:8px;padding:10px 12px;background:var(--soft);border-radius:12px;border:1.5px solid var(--fc,var(--c1))}
.input-row.open{display:flex}
.input-num{font-family:'Anybody',sans-serif;font-weight:700;font-size:15px;color:var(--muted);flex-shrink:0;min-width:18px}
.input-field{flex:1;background:none;border:none;border-bottom:1.5px solid var(--fc,var(--c1));font-family:'Anybody',sans-serif;font-weight:700;font-size:16px;color:var(--ink);outline:none;padding:4px 0;min-width:0}
.input-field::placeholder{color:var(--border)}
.btn-ok{background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:'Anybody',sans-serif;font-weight:700;font-size:14px;padding:7px 14px;cursor:pointer;flex-shrink:0;min-height:34px;transition:background .15s}
.btn-ok:active{background:var(--fc,var(--c1))}
.btn-x2{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:4px 6px;min-height:34px;display:flex;align-items:center}

/* ── NOVA FRENTE MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,.6);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:32px 24px 44px;animation:slideUp .25s cubic-bezier(.3,1.3,.5,1);position:relative;max-height:95vh;overflow-y:auto}
.modal::before{content:'';display:block;width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 28px}
.modal-title{font-family:'Anybody',sans-serif;font-weight:900;font-size:30px;letter-spacing:-1px;margin-bottom:24px;color:var(--ink)}
.modal-inp{width:100%;background:var(--soft);border:1.5px solid var(--border);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;color:var(--ink);outline:none;padding:13px 16px;margin-bottom:20px;transition:border-color .15s}
.modal-inp:focus{border-color:var(--ink)}
.modal-inp::placeholder{color:var(--muted)}
.color-pick{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:28px}
.csw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.csw.sel{border-color:var(--ink);transform:scale(1.18)}
.modal-footer{display:flex;gap:10px}
.btn-cancel-m{flex:1;background:var(--soft);border:1.5px solid var(--border);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:15px;padding:13px;cursor:pointer;color:var(--muted);min-height:48px}
.btn-create-m{flex:2;background:var(--ink);color:#fff;border:none;border-radius:12px;font-family:'Anybody',sans-serif;font-weight:700;font-size:17px;letter-spacing:.3px;padding:13px;cursor:pointer;min-height:48px}
.btn-create-m:active{background:var(--c1)}
.btn-close-m{position:absolute;top:18px;right:18px;background:var(--soft);border:none;border-radius:50%;width:34px;height:34px;font-size:15px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}

/* ── COLOR POPOVER ── */
.color-popover{position:fixed;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.18);animation:fadeDown .15s ease;width:184px}
.color-popover .csw2{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s}
.color-popover .csw2:hover{transform:scale(1.15)}
.color-popover .csw2.sel{border-color:var(--ink);transform:scale(1.18)}

/* ── MOVE FOLDER POPOVER ── */
.folder-popover{position:fixed;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:8px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.16);animation:fadeDown .15s ease;min-width:180px}
.folder-popover-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--ink);transition:background .12s}
.folder-popover-item:hover{background:var(--soft)}
.folder-popover-item.active{font-weight:600}

/* ── MOBILE ── */
@media(max-width:680px){
  .sidebar{display:none}
  .content{padding:20px 14px 80px}
  .folder-title{font-size:22px}
  .mobile-folder-bar{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;border-bottom:1.5px solid var(--border);scrollbar-width:none;background:var(--card)}
  .mobile-folder-bar::-webkit-scrollbar{display:none}
  .mfb-item{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;color:var(--muted);transition:all .15s;background:transparent}
  .mfb-item.active{background:var(--ink);color:#fff;border-color:var(--ink)}
}
@media(min-width:681px){
  .mobile-folder-bar{display:none}
  .overlay,.overlay2{align-items:center}
  .modal,.desc-sheet{border-radius:24px;max-width:480px;padding:36px;animation:modalPop .22s cubic-bezier(.3,1.3,.5,1)}
  .modal::before,.desc-sheet::before{display:none}
  @keyframes modalPop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .fdel{opacity:0;transition:opacity .2s}
  .frente-card:hover .fdel{opacity:1}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><div class="login-logo-dot"></div>Frentes de Trabalho</div>
    <div class="login-sub">Entre com seu acesso para continuar.</div>
    <label class="lbl">E-mail</label>
    <input class="login-inp" id="login-email" type="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')doLogin()"/>
    <label class="lbl">Senha</label>
    <input class="login-inp" id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="logo"><div class="logo-dot"></div>Frentes</div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot"></div>
      <div class="user-badge" id="user-badge"></div>
      <button class="hbtn" onclick="exportExcel()">📊 Exportar</button>
      <button class="hbtn danger" onclick="doLogout()">Sair</button>
      <button class="hbtn primary" onclick="openModal()">+ Nova Frente</button>
    </div>
  </header>

  <!-- Mobile folder bar -->
  <div class="mobile-folder-bar" id="mobile-folder-bar"></div>

  <div class="app-body">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Pastas</div>
        <div id="folder-list"></div>
        <div style="padding:0 0 4px">
          <button class="btn-new-folder" onclick="createFolder()">＋ Nova pasta</button>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="content">
      <div id="loading-state" class="loading-state">
        <div class="loading-spinner"></div>
        <div>Carregando...</div>
      </div>
      <div id="folder-title-row" class="folder-title-row" style="display:none">
        <div class="folder-title" id="folder-title-text">Pasta Geral</div>
      </div>
      <div id="empty" class="empty" style="display:none">
        <div class="empty-big">vazio</div>
        <div class="empty-sub">Nenhuma frente nesta pasta.<br>Use <strong>+ Nova Frente</strong> para começar.</div>
      </div>
      <div id="wrap"></div>
    </div>
  </div>
</div>

<!-- Nova Frente Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="btn-close-m" onclick="closeModal()">✕</button>
    <div class="modal-title">Nova Frente</div>
    <label class="lbl">Nome</label>
    <input class="modal-inp" id="modal-inp" placeholder="Ex: Financeira, Saúde…" onkeydown="if(event.key==='Enter')createFrente();if(event.key==='Escape')closeModal()"/>
    <label class="lbl">Pasta</label>
    <select class="modal-inp" id="modal-folder" style="margin-bottom:20px"></select>
    <label class="lbl">Cor</label>
    <div class="color-pick" id="color-pick"></div>
    <div class="modal-footer">
      <button class="btn-cancel-m" onclick="closeModal()">Cancelar</button>
      <button class="btn-create-m" onclick="createFrente()">Criar</button>
    </div>
  </div>
</div>

<!-- Nova Pasta Modal -->
<div class="overlay" id="overlay-folder">
  <div class="modal">
    <button class="btn-close-m" onclick="closeFolderModal()">✕</button>
    <div class="modal-title">Nova Pasta</div>
    <label class="lbl">Nome da pasta</label>
    <input class="modal-inp" id="folder-inp" placeholder="Ex: Pessoal, Trabalho…" onkeydown="if(event.key==='Enter')confirmFolder();if(event.key==='Escape')closeFolderModal()"/>
    <div class="modal-footer">
      <button class="btn-cancel-m" onclick="closeFolderModal()">Cancelar</button>
      <button class="btn-create-m" onclick="confirmFolder()">Criar</button>
    </div>
  </div>
</div>

<!-- Description Sheet -->
<div class="overlay2" id="desc-overlay">
  <div class="desc-sheet">
    <button class="btn-close-sheet" onclick="closeDesc()">✕</button>
    <span class="desc-tag-lbl" id="desc-tag"></span>
    <div class="desc-sheet-title" id="desc-sheet-title"></div>
    <textarea class="desc-textarea" id="desc-textarea" placeholder="Adicione uma descrição…" rows="5"></textarea>
    <div class="desc-footer">
      <button class="btn-desc-cancel" onclick="closeDesc()">Cancelar</button>
      <button class="btn-desc-save" onclick="saveDesc()">Salvar</button>
    </div>
  </div>
</div>

<!-- SheetJS for Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA41hK41Ee6eiGaBrUMK9bJjQuMwJUhlL4",
  authDomain: "frentes-de-trabalho-672e5.firebaseapp.com",
  projectId: "frentes-de-trabalho-672e5",
  storageBucket: "frentes-de-trabalho-672e5.firebasestorage.app",
  messagingSenderId: "134530646717",
  appId: "1:134530646717:web:02df929cedc183ffaf2dd4"
};
const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let data        = [];   // frentes
let folders     = [];   // [{id, name}]  — "geral" is always virtual
let currentFolder = 'geral';
let picked      = '#ff5c3a';
let openSubs    = {};
let descCtx     = null;
let _skipSnap   = false;
let dragSrcIdx  = null;
let dragSrcType = null; // 'frente'|'etapa'|'sub'
let dragEtapaCtx = null; // {pi,ti}
let dragSubCtx   = null; // {pi,ti,mi}

const COLORS = ['#ff5c3a','#ff9500','#ffd60a','#34c759','#00c7be','#32ade6','#3a7bff','#9b5de5','#e63946','#ff2d92','#8e4585','#5e4b2b','#404040','#6e6e73','#1a7060','#2d5f2d'];
const GERAL_ID = 'geral';

// ═══════════════════════════════
//  HELPERS
// ═══════════════════════════════
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function folderName(id){ if(id===GERAL_ID) return 'Pasta Geral'; const f=folders.find(f=>f.id===id); return f?f.name:'Pasta Geral'; }

function ring(size,stroke,pct,color,bg){
  const r=(size-stroke)/2,c=2*Math.PI*r,d=(pct/100)*c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${bg}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${d} ${c}" stroke-dashoffset="${c/4}" stroke-linecap="round"
      style="transition:stroke-dasharray .5s cubic-bezier(.4,0,.2,1)"/>
  </svg>`;
}
function etapaPct(e){ if(!e.subs||!e.subs.length) return e.done?100:0; return Math.round(e.subs.filter(s=>s.done).length/e.subs.length*100); }
function trilhaPct(t){ if(!t.etapas||!t.etapas.length) return 0; return Math.round(t.etapas.reduce((s,e)=>s+etapaPct(e),0)/t.etapas.length); }

// Auto-resize textarea
function autoResize(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

// ═══════════════════════════════
//  SYNC
// ═══════════════════════════════
function setSyncState(s){
  const d=document.getElementById('sync-dot'); if(!d) return;
  d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
}
async function save(){
  setSyncState('syncing'); _skipSnap=true;
  try {
    await setDoc(doc(db,'workspace','shared'),{
      data:JSON.stringify(data), folders:JSON.stringify(folders), updatedAt:serverTimestamp()
    });
    setSyncState('ok');
  } catch(e){ console.error(e); setSyncState('error'); }
}
function listenFirestore(){
  onSnapshot(doc(db,'workspace','shared'), snap=>{
    if(_skipSnap){ _skipSnap=false; return; }
    if(snap.exists()){
      try { data=JSON.parse(snap.data().data)||[]; } catch{ data=[]; }
      try { folders=JSON.parse(snap.data().folders)||[]; } catch{ folders=[]; }
    } else { data=[]; folders=[]; }
    renderSidebar(); render(); setTimeout(()=>{ initTextareas(); initDragHandles(); },80);
  });
}

// ═══════════════════════════════
//  AUTH
// ═══════════════════════════════
onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('user-badge').textContent=user.email;
    listenFirestore();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});
window.doLogin=async()=>{
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error'); errEl.textContent='';
  if(!email||!pass){ errEl.textContent='Preencha e-mail e senha.'; return; }
  try { await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){
    const m={'auth/invalid-credential':'E-mail ou senha incorretos.','auth/user-not-found':'Usuário não encontrado.','auth/wrong-password':'Senha incorreta.','auth/invalid-email':'E-mail inválido.','auth/too-many-requests':'Muitas tentativas.'};
    errEl.textContent=m[e.code]||'Erro ao entrar.';
  }
};
window.doLogout=async()=>{ await signOut(auth); };

// ═══════════════════════════════
//  SIDEBAR
// ═══════════════════════════════
function renderSidebar(){
  const fl=document.getElementById('folder-list');
  const mfb=document.getElementById('mobile-folder-bar');
  if(!fl) return;

  const allFolders=[{id:GERAL_ID,name:'Pasta Geral'},...folders];
  fl.innerHTML='';
  mfb.innerHTML='';

  allFolders.forEach(f=>{
    const count=data.filter(fr=>(fr.folderId||GERAL_ID)===f.id).length;
    const isActive=currentFolder===f.id;

    // sidebar item
    const item=document.createElement('div');
    item.className='sidebar-item'+(isActive?' active':'');
    item.innerHTML=`<span class="folder-icon">📁</span><span class="folder-name">${esc(f.name)}</span><span class="folder-count">${count}</span>${f.id!==GERAL_ID?`<button class="folder-del" onclick="event.stopPropagation();deleteFolder('${f.id}')" title="Deletar pasta">✕</button>`:''}`;
    item.onclick=()=>{ currentFolder=f.id; renderSidebar(); render(); };
    fl.appendChild(item);

    // mobile bar
    const mItem=document.createElement('div');
    mItem.className='mfb-item'+(isActive?' active':'');
    mItem.textContent=f.name;
    mItem.onclick=()=>{ currentFolder=f.id; renderSidebar(); render(); };
    mfb.appendChild(mItem);
  });

  // update folder select in modal
  const sel=document.getElementById('modal-folder');
  if(sel){
    sel.innerHTML=allFolders.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');
    sel.value=currentFolder;
  }
}

window.createFolder=()=>{ document.getElementById('overlay-folder').classList.add('open'); setTimeout(()=>document.getElementById('folder-inp').focus(),80); };
window.closeFolderModal=()=>{ document.getElementById('overlay-folder').classList.remove('open'); document.getElementById('folder-inp').value=''; };
window.confirmFolder=async()=>{
  const name=document.getElementById('folder-inp').value.trim(); if(!name) return;
  folders.push({id:uid(),name});
  await save(); renderSidebar(); closeFolderModal();
};
window.deleteFolder=async(id)=>{
  if(!confirm('Deletar pasta? As frentes dentro dela vão para a Pasta Geral.')) return;
  data.forEach(f=>{ if(f.folderId===id) f.folderId=GERAL_ID; });
  folders=folders.filter(f=>f.id!==id);
  if(currentFolder===id) currentFolder=GERAL_ID;
  await save(); renderSidebar(); render();
};
document.getElementById('overlay-folder').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay-folder')) closeFolderModal(); });

// ═══════════════════════════════
//  RENDER
// ═══════════════════════════════
function render(){
  const wrap=document.getElementById('wrap');
  const empty=document.getElementById('empty');
  const load=document.getElementById('loading-state');
  const titleRow=document.getElementById('folder-title-row');
  const titleText=document.getElementById('folder-title-text');
  if(load) load.style.display='none';
  if(titleRow){ titleRow.style.display='flex'; titleText.textContent=folderName(currentFolder); }

  const visible=data.filter(f=>(f.folderId||GERAL_ID)===currentFolder);
  empty.style.display=visible.length===0?'block':'none';
  wrap.innerHTML='';

  visible.forEach((f,vi)=>{
    const pi=data.indexOf(f);
    const div=document.createElement('div');
    div.className='frente-card';
    div.dataset.pi=pi;
    div.style.setProperty('--fc',f.color);
    div.innerHTML=`<div class="frente-card-inner">${renderFrente(f,pi)}</div>`;
    wrap.appendChild(div);
  });
}

async function reorderFrentes(fromVi,toVi){
  const visible=data.filter(f=>(f.folderId||GERAL_ID)===currentFolder);
  const moved=visible.splice(fromVi,1)[0];
  visible.splice(toVi,0,moved);
  // rebuild data preserving other folders order
  const others=data.filter(f=>(f.folderId||GERAL_ID)!==currentFolder);
  data=[...others,...visible];
  await save(); render();
}

function renderFrente(f,pi){
  const trilhasTotal=f.trilhas?f.trilhas.length:0;
  const descBtn=`<button class="btn-desc ${f.desc?'has-desc':''}" onclick="openDesc('f',${pi},-1,-1,-1)" title="${f.desc?'Ver descrição':'Adicionar descrição'}">${f.desc?'📋':'desc'}</button>`;
  const icon=`<div onclick="event.stopPropagation();openColorPicker(${pi},this)" style="width:50px;height:50px;border-radius:13px;background:${f.color};flex-shrink:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;user-select:none;position:relative;" title="Mudar cor">
    <span style="font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#fff;line-height:1">${trilhasTotal}</span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:7px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.08em">trilha${trilhasTotal!==1?'s':''}</span>
    <span style="position:absolute;bottom:3px;right:4px;font-size:8px;opacity:.7">🎨</span>
  </div>`;
  const trilhasHtml=f.trilhas&&f.trilhas.length>0?f.trilhas.map((t,ti)=>renderTrilha(f,pi,t,ti)).join(''):`<div style="padding:10px 0;font-size:13px;color:var(--muted);font-style:italic">Nenhuma trilha ainda.</div>`;
  return `
    <div class="frente-header" onclick="toggleFrente(${pi})">
      <div class="drag-handle" data-drag="frente" data-pi="${pi}" title="Arrastar para reordenar">⠿</div>
      ${icon}
      <div class="frente-info">
        <div class="ftag">Frente · ${esc(folderName(f.folderId||GERAL_ID))}</div>
        <div class="frente-name-row">
          <div class="editable-wrap" style="--fc:${f.color}">
            <textarea class="editable-name frente-editable" rows="1"
              style="font-family:'Anybody',sans-serif;font-weight:700;font-size:clamp(17px,4vw,22px);letter-spacing:-.3px;line-height:1.2"
              onblur="saveName('f',${pi},-1,-1,-1,this.value)"
              onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
              onclick="event.stopPropagation()"
              oninput="autoResize(this)"
              title="Clique para editar">${esc(f.name)}</textarea>
            <span onclick="event.stopPropagation()">${descBtn}</span>
          </div>
        </div>
        <button class="btn-move-folder" onclick="event.stopPropagation();openFolderPicker(${pi},this)" title="Mover para outra pasta">📂 mover</button>
      </div>
      <button class="fdel" onclick="event.stopPropagation();deleteFrente(${pi})">🗑</button>

// ═══════════════════════════════
//  DRAG & DROP — POINTER EVENTS
// ═══════════════════════════════
let dnd = null;

function initDragHandles(){
  document.querySelectorAll('.drag-handle').forEach(handle=>{
    handle.onpointerdown = null;
    handle.onpointerdown = startDrag;
  });
}

function startDrag(e){
  if(e.button !== undefined && e.button !== 0) return; // left click only
  e.preventDefault();
  e.stopPropagation();

  const handle = e.currentTarget;
  handle.setPointerCapture(e.pointerId);

  const type = handle.dataset.drag;
  const pi   = parseInt(handle.dataset.pi);
  const ti   = handle.dataset.ti !== undefined ? parseInt(handle.dataset.ti) : null;
  const mi   = handle.dataset.mi !== undefined ? parseInt(handle.dataset.mi) : null;
  const si   = handle.dataset.si !== undefined ? parseInt(handle.dataset.si) : null;

  let el;
  if(type==='frente') el = handle.closest('.frente-card');
  else if(type==='etapa') el = handle.closest('.etapa-wrap');
  else if(type==='sub') el = handle.closest('.sub-item');
  if(!el) return;

  // label for clone
  let label = '';
  if(type==='frente') label = data[pi]?.name || 'Frente';
  else if(type==='etapa') label = data[pi]?.trilhas[ti]?.etapas[mi]?.name || 'Etapa';
  else if(type==='sub') label = data[pi]?.trilhas[ti]?.etapas[mi]?.subs[si]?.name || 'Subetapa';

  // floating clone
  const clone = document.createElement('div');
  clone.className = 'drag-clone';
  clone.textContent = '⠿ ' + label;
  clone.style.left = (e.clientX + 12) + 'px';
  clone.style.top  = (e.clientY - 10) + 'px';
  document.body.appendChild(clone);

  // placeholder same height as element
  const rect = el.getBoundingClientRect();
  const placeholder = document.createElement('div');
  placeholder.className = 'drag-placeholder';
  placeholder.style.height = Math.max(rect.height, 40) + 'px';
  el.parentNode.insertBefore(placeholder, el);
  el.classList.add('dragging-ghost');

  dnd = { type, pi, ti, mi, si, el, clone, placeholder, handle };

  handle.onpointermove = onDragMove;
  handle.onpointerup   = onDragEnd;
  handle.onpointercancel = onDragEnd;
}

function onDragMove(e){
  if(!dnd) return;
  e.preventDefault();

  const {clone, placeholder, type, el} = dnd;
  clone.style.left = (e.clientX + 12) + 'px';
  clone.style.top  = (e.clientY - 10) + 'px';

  // temporarily hide clone & ghost to hit-test underneath
  clone.style.visibility = 'hidden';
  el.style.visibility = 'hidden';
  const under = document.elementFromPoint(e.clientX, e.clientY);
  clone.style.visibility = '';
  el.style.visibility = '';
  if(!under) return;

  if(type === 'frente'){
    const target = under.closest('.frente-card');
    if(target && target !== el){
      const r = target.getBoundingClientRect();
      const after = e.clientY > r.top + r.height / 2;
      target.parentNode.insertBefore(placeholder, after ? target.nextSibling : target);
    }
  } else if(type === 'etapa'){
    const target = under.closest('.etapa-wrap');
    if(target && target !== el){
      const r = target.getBoundingClientRect();
      const after = e.clientY > r.top + r.height / 2;
      target.parentNode.insertBefore(placeholder, after ? target.nextSibling : target);
    }
  } else if(type === 'sub'){
    const target = under.closest('.sub-item');
    if(target && target !== el){
      const r = target.getBoundingClientRect();
      const after = e.clientY > r.top + r.height / 2;
      target.parentNode.insertBefore(placeholder, after ? target.nextSibling : target);
    }
  }
}

async function onDragEnd(e){
  if(!dnd) return;
  const {type, pi, ti, mi, si, el, clone, placeholder, handle} = dnd;

  handle.onpointermove = null;
  handle.onpointerup   = null;
  handle.onpointercancel = null;
  try { handle.releasePointerCapture(e.pointerId); } catch(_){}

  // compute new index from placeholder siblings
  if(type === 'frente'){
    const wrap    = document.getElementById('wrap');
    const visible = data.filter(f=>(f.folderId||'geral')===currentFolder);
    const siblings = [...wrap.children].filter(c=>c.classList.contains('frente-card')||c===placeholder);
    const newIdx  = siblings.indexOf(placeholder);
    const oldIdx  = visible.indexOf(data[pi]);
    if(newIdx >= 0 && newIdx !== oldIdx){
      const [moved] = visible.splice(oldIdx, 1);
      const insertAt = newIdx > oldIdx ? newIdx - 1 : newIdx;
      visible.splice(insertAt, 0, moved);
      const others = data.filter(f=>(f.folderId||'geral') !== currentFolder);
      data = [...others, ...visible];
      await save();
    }
  } else if(type === 'etapa'){
    const list    = document.getElementById(`etapas-list-${pi}-${ti}`);
    if(list){
      const etapas  = data[pi].trilhas[ti].etapas;
      const siblings = [...list.children].filter(c=>c.classList.contains('etapa-wrap')||c===placeholder);
      const newIdx  = siblings.indexOf(placeholder);
      const oldIdx  = mi;
      if(newIdx >= 0 && newIdx !== oldIdx){
        const [moved] = etapas.splice(oldIdx, 1);
        etapas.splice(newIdx > oldIdx ? newIdx - 1 : newIdx, 0, moved);
        await save();
      }
    }
  } else if(type === 'sub'){
    const list   = document.getElementById(`subs-list-${pi}-${ti}-${mi}`);
    if(list){
      const subs    = data[pi].trilhas[ti].etapas[mi].subs;
      const siblings = [...list.children].filter(c=>c.classList.contains('sub-item')||c===placeholder);
      const newIdx  = siblings.indexOf(placeholder);
      const oldIdx  = si;
      if(newIdx >= 0 && newIdx !== oldIdx){
        const [moved] = subs.splice(oldIdx, 1);
        subs.splice(newIdx > oldIdx ? newIdx - 1 : newIdx, 0, moved);
        await save();
      }
    }
  }

  clone.remove();
  placeholder.remove();
  el.classList.remove('dragging-ghost');
  dnd = null;
  render();
  setTimeout(()=>{ initTextareas(); initDragHandles(); }, 60);
}

// ═══════════════════════════════
//  KEYBOARD — ENTER OPENS NEXT
// ═══════════════════════════════
window.handleEtapaKey=(e,pi,ti,mi)=>{
  if(e.key==='Enter'){ e.preventDefault(); e.target.blur();
    // open add row for next etapa
    showAddEtapa(pi,ti);
  } else if(e.key==='Escape'){ e.target.blur(); }
};
window.handleSubKey=(e,pi,ti,mi)=>{
  if(e.key==='Enter'){ confirmSub(pi,ti,mi); }
  else if(e.key==='Escape'){ e.target.value=''; }
};
window.handleSubEditKey=(e,pi,ti,mi,si)=>{
  if(e.key==='Enter'){ e.preventDefault(); e.target.blur();
    // focus next sub input
    openSubs[`${pi}-${ti}-${mi}`]=true;
    setTimeout(()=>{ const inp=document.getElementById(`si-${pi}-${ti}-${mi}`); if(inp) inp.focus(); },80);
  } else if(e.key==='Escape'){ e.target.blur(); }
};

// ═══════════════════════════════
//  ACTIONS
// ═══════════════════════════════
window.toggleFrente=(pi)=>{ data[pi].open=!data[pi].open; save(); render(); setTimeout(()=>{ initTextareas(); initDragHandles(); },60); };
window.toggleTrilha=(pi,ti)=>{ data[pi].trilhas[ti].open=!data[pi].trilhas[ti].open; save(); render(); setTimeout(()=>{ initTextareas(); initDragHandles(); },60); };
window.toggleEtapaDone=(pi,ti,mi)=>{ const e=data[pi].trilhas[ti].etapas[mi]; e.done=!e.done; if(e.subs&&e.subs.length) e.subs.forEach(s=>s.done=e.done); save(); render(); setTimeout(()=>{ initTextareas(); initDragHandles(); },60); };
window.toggleSubs=(pi,ti,mi)=>{ const k=`${pi}-${ti}-${mi}`; openSubs[k]=!openSubs[k]; render(); setTimeout(()=>{ initTextareas(); initDragHandles(); },60); setTimeout(()=>{ const el=document.getElementById(`sp-${pi}-${ti}-${mi}`); if(el&&openSubs[k]) el.scrollIntoView({behavior:'smooth',block:'nearest'}); },80); };
window.toggleSub=(pi,ti,mi,si)=>{ data[pi].trilhas[ti].etapas[mi].subs[si].done=!data[pi].trilhas[ti].etapas[mi].subs[si].done; const all=data[pi].trilhas[ti].etapas[mi].subs.every(s=>s.done); data[pi].trilhas[ti].etapas[mi].done=all; save(); render(); setTimeout(()=>{ const i=document.getElementById(`si-${pi}-${ti}-${mi}`); if(i) i.focus(); },50); };

window.deleteFrente=(pi)=>{ if(!confirm(`Deletar "${data[pi].name}"?`)) return; data.splice(pi,1); save(); renderSidebar(); render(); };
window.deleteTrilha=(pi,ti)=>{ data[pi].trilhas.splice(ti,1); save(); render(); };
window.deleteEtapa=(pi,ti,mi)=>{ data[pi].trilhas[ti].etapas.splice(mi,1); save(); render(); };
window.deleteSub=(pi,ti,mi,si)=>{ data[pi].trilhas[ti].etapas[mi].subs.splice(si,1); save(); render(); };

window.saveName=(type,pi,ti,mi,si,val)=>{
  val=val.trim(); if(!val) return render();
  if(type==='f') data[pi].name=val;
  else if(type==='t') data[pi].trilhas[ti].name=val;
  else if(type==='e') data[pi].trilhas[ti].etapas[mi].name=val;
  else if(type==='s'){ const rTi=Math.floor(ti/1000),rMi=ti%1000; data[pi].trilhas[rTi].etapas[rMi].subs[mi].name=val; }
  save(); render(); setTimeout(()=>{ initTextareas(); initDragHandles(); },60);
};

window.cancelAdd=(rowId,inpId)=>{ const r=document.getElementById(rowId); if(r) r.classList.remove('open'); const i=document.getElementById(inpId); if(i) i.value=''; };
window.showAddTrilha=(pi)=>{ const r=document.getElementById(`atr-${pi}`); if(r){ r.classList.add('open'); document.getElementById(`ati-${pi}`).focus(); } };
window.confirmTrilha=async(pi)=>{ const inp=document.getElementById(`ati-${pi}`); const name=inp?inp.value.trim():''; if(!name) return; data[pi].trilhas.push({name,desc:'',open:true,etapas:[]}); await save(); render(); setTimeout(()=>{ initTextareas(); initDragHandles(); showAddTrilha(pi); },60); };
window.showAddEtapa=(pi,ti)=>{ const r=document.getElementById(`aer-${pi}-${ti}`); if(r){ r.classList.add('open'); document.getElementById(`aei-${pi}-${ti}`).focus(); } };
window.confirmEtapa=async(pi,ti)=>{ const inp=document.getElementById(`aei-${pi}-${ti}`); const name=inp?inp.value.trim():''; if(!name) return; data[pi].trilhas[ti].etapas.push({name,desc:'',done:false,subs:[]}); await save(); render(); setTimeout(()=>{ initTextareas(); initDragHandles(); showAddEtapa(pi,ti); },60); };
window.confirmSub=async(pi,ti,mi)=>{ const inp=document.getElementById(`si-${pi}-${ti}-${mi}`); const name=inp?inp.value.trim():''; if(!name) return; data[pi].trilhas[ti].etapas[mi].subs.push({name,desc:'',done:false}); openSubs[`${pi}-${ti}-${mi}`]=true; await save(); render(); setTimeout(()=>{ initTextareas(); initDragHandles(); const i=document.getElementById(`si-${pi}-${ti}-${mi}`); if(i) i.focus(); },60); };

let folderPickerPi=null;
window.openFolderPicker=(pi,anchorEl)=>{
  closeFolderPicker();
  folderPickerPi=pi;
  const pop=document.createElement('div');
  pop.className='folder-popover'; pop.id='folder-popover';
  const allFolders=[{id:GERAL_ID,name:'Pasta Geral'},...folders];
  allFolders.forEach(f=>{
    const item=document.createElement('div');
    item.className='folder-popover-item'+((data[pi].folderId||GERAL_ID)===f.id?' active':'');
    item.innerHTML=`📁 ${esc(f.name)}`;
    item.onclick=async(e)=>{ e.stopPropagation(); data[pi].folderId=f.id; await save(); renderSidebar(); render(); closeFolderPicker(); };
    pop.appendChild(item);
  });
  document.body.appendChild(pop);
  const rect=anchorEl.getBoundingClientRect();
  let top=rect.bottom+6, left=rect.left;
  if(left+200>window.innerWidth-8) left=window.innerWidth-208;
  if(top+200>window.innerHeight-8) top=rect.top-206;
  pop.style.top=top+'px'; pop.style.left=left+'px';
  setTimeout(()=>document.addEventListener('click',closeFolderPicker,{once:true}),0);
};
function closeFolderPicker(){ const p=document.getElementById('folder-popover'); if(p) p.remove(); folderPickerPi=null; }

// ═══════════════════════════════
//  DESCRIPTION
// ═══════════════════════════════
window.openDesc=(type,pi,ti,mi,si)=>{
  const titles={f:'Frente',t:'Trilha',e:'Etapa',s:'Subetapa'};
  let item,name;
  if(type==='f'){ item=data[pi]; name=item.name; descCtx={type,pi,ti,mi,si}; }
  else if(type==='t'){ item=data[pi].trilhas[ti]; name=item.name; descCtx={type,pi,ti,mi,si}; }
  else if(type==='e'){ item=data[pi].trilhas[ti].etapas[mi]; name=item.name; descCtx={type,pi,ti,mi,si}; }
  else if(type==='s'){ const rTi=Math.floor(ti/1000),rMi=ti%1000; item=data[pi].trilhas[rTi].etapas[rMi].subs[mi]; name=item.name; descCtx={type,pi,ti:rTi,mi:rMi,si:mi}; }
  document.getElementById('desc-tag').textContent=titles[type];
  document.getElementById('desc-sheet-title').textContent=name;
  document.getElementById('desc-textarea').value=item.desc||'';
  document.getElementById('desc-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('desc-textarea').focus(),80);
};
window.closeDesc=()=>{ document.getElementById('desc-overlay').classList.remove('open'); descCtx=null; };
window.saveDesc=async()=>{
  if(!descCtx) return;
  const val=document.getElementById('desc-textarea').value.trim();
  const {type,pi,ti,mi,si}=descCtx;
  if(type==='f') data[pi].desc=val;
  else if(type==='t') data[pi].trilhas[ti].desc=val;
  else if(type==='e') data[pi].trilhas[ti].etapas[mi].desc=val;
  else if(type==='s') data[pi].trilhas[ti].etapas[mi].subs[si].desc=val;
  await save(); render(); setTimeout(initTextareas,50); closeDesc();
};
document.getElementById('desc-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('desc-overlay')) closeDesc(); });

// ═══════════════════════════════
//  COLOR PICKER
// ═══════════════════════════════
window.openColorPicker=(pi,anchorEl)=>{
  closeColorPicker();
  const pop=document.createElement('div'); pop.className='color-popover'; pop.id='color-popover';
  COLORS.forEach(c=>{ const sw=document.createElement('div'); sw.className='csw2'+(c===data[pi].color?' sel':''); sw.style.background=c; sw.onclick=async e=>{ e.stopPropagation(); data[pi].color=c; await save(); render(); setTimeout(initTextareas,50); closeColorPicker(); }; pop.appendChild(sw); });
  document.body.appendChild(pop);
  const rect=anchorEl.getBoundingClientRect(), popW=184, popH=148;
  let top=rect.bottom+8, left=rect.left;
  if(left+popW>window.innerWidth-8) left=window.innerWidth-popW-8;
  if(top+popH>window.innerHeight-8) top=rect.top-popH-8;
  pop.style.top=top+'px'; pop.style.left=left+'px';
  setTimeout(()=>document.addEventListener('click',closeColorPicker,{once:true}),0);
};
function closeColorPicker(){ const p=document.getElementById('color-popover'); if(p) p.remove(); }

// ═══════════════════════════════
//  NOVA FRENTE MODAL
// ═══════════════════════════════
window.openModal=()=>{ renderSidebar(); document.getElementById('overlay').classList.add('open'); setTimeout(()=>document.getElementById('modal-inp').focus(),80); };
window.closeModal=()=>{ document.getElementById('overlay').classList.remove('open'); document.getElementById('modal-inp').value=''; };
window.createFrente=async()=>{
  const name=document.getElementById('modal-inp').value.trim(); if(!name){ document.getElementById('modal-inp').focus(); return; }
  const folderId=document.getElementById('modal-folder').value||GERAL_ID;
  data.push({name,desc:'',color:picked,open:true,folderId,trilhas:[]});
  await save(); renderSidebar(); if(currentFolder===folderId) render(); closeModal();
};
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay')) closeModal(); });

// Color swatches
(()=>{ const row=document.getElementById('color-pick'); COLORS.forEach(c=>{ const sw=document.createElement('div'); sw.className='csw'+(c===picked?' sel':''); sw.style.background=c; sw.onclick=()=>{ picked=c; document.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel')); sw.classList.add('sel'); }; row.appendChild(sw); }); })();

// ═══════════════════════════════
//  EXPORT EXCEL
// ═══════════════════════════════
window.exportExcel=()=>{
  const rows=[['Pasta','Frente','Cor','Trilha','% Trilha','Etapa','% Etapa','Concluída','Subetapa','Subetapa Concluída','Descrição']];
  data.forEach(f=>{
    const pasta=folderName(f.folderId||GERAL_ID);
    if(!f.trilhas||!f.trilhas.length){ rows.push([pasta,f.name,f.color,'','','','','','','',f.desc||'']); return; }
    f.trilhas.forEach(t=>{
      if(!t.etapas||!t.etapas.length){ rows.push([pasta,f.name,f.color,t.name,trilhaPct(t)+'%','','','','','',t.desc||'']); return; }
      t.etapas.forEach(e=>{
        if(!e.subs||!e.subs.length){ rows.push([pasta,f.name,f.color,t.name,trilhaPct(t)+'%',e.name,etapaPct(e)+'%',e.done?'Sim':'Não','','',e.desc||'']); return; }
        e.subs.forEach(s=>{ rows.push([pasta,f.name,f.color,t.name,trilhaPct(t)+'%',e.name,etapaPct(e)+'%',e.done?'Sim':'Não',s.name,s.done?'Sim':'Não',s.desc||'']); });
      });
    });
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[8,20,8,20,8,20,8,8,20,10,30].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,'Frentes de Trabalho');
  XLSX.writeFile(wb,'frentes-de-trabalho.xlsx');
};

// init textareas after render
const _origRender=render;
function renderAndInit(){ _origRender(); setTimeout(()=>{ initTextareas(); initDragHandles(); },60); }
</script>
