<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Frentes de Trabalho</title>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #f7f4ef;
  --card:   #ffffff;
  --border: #e8e2d8;
  --ink:    #1a1714;
  --muted:  #8c8478;
  --soft:   #f0ece4;
  --c1:#ff5c3a; --c2:#3a7bff; --c3:#2ec97e;
  --c4:#f5a623; --c5:#9b5de5; --c6:#00b4d8;
  --c7:#e63946; --c8:#06d6a0;
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.018;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(247,244,239,.94);backdrop-filter:blur(12px);
border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:14px 20px;gap:12px}
.logo{font-family:'Anybody',sans-serif;font-weight:900;font-size:26px;letter-spacing:-1px;color:var(--ink);display:flex;align-items:center;gap:6px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--c1);flex-shrink:0;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
.btn-new{background:var(--ink);color:#fff;border:none;border-radius:10px;font-family:'Anybody',sans-serif;font-weight:700;
font-size:14px;letter-spacing:.3px;padding:10px 18px;cursor:pointer;transition:transform .15s,background .15s;min-height:42px;white-space:nowrap}
.btn-new:active{transform:scale(.96);background:var(--c1)}

/* ── MAIN ── */
main{max-width:740px;margin:0 auto;padding:28px 16px 100px}

/* ── EMPTY ── */
.empty{text-align:center;padding:80px 0}
.empty-big{font-family:'Anybody',sans-serif;font-weight:900;font-size:clamp(56px,20vw,96px);letter-spacing:-3px;line-height:1;color:var(--border);margin-bottom:20px}
.empty-sub{font-size:16px;color:var(--muted)}
.empty-sub strong{color:var(--ink)}

/* ── RING ── */
.ring-wrap{flex-shrink:0;position:relative}
.ring-wrap svg{display:block}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;pointer-events:none}
.ring-pct{font-family:'Anybody',sans-serif;font-weight:900;font-size:15px;color:var(--ink)}
.ring-done{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:1px}
.ring-check{font-size:14px;display:none}
.ring-wrap.all-done .ring-pct{display:none}
.ring-wrap.all-done .ring-check{display:block}

/* ══════════════════════════
   EDITABLE NAME
══════════════════════════ */
.editable-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.editable-name{
  font-family:inherit;font-weight:inherit;font-size:inherit;
  letter-spacing:inherit;color:inherit;
  background:none;border:none;outline:none;
  padding:2px 4px;border-radius:6px;
  cursor:pointer;
  transition:background .15s;
  width:100%;min-width:0;
  word-break:break-word;
  white-space:normal;
  line-height:inherit;
}
.editable-name:hover{background:rgba(0,0,0,.05)}
.editable-name:focus{background:rgba(0,0,0,.06);cursor:text;outline:2px solid var(--fc,var(--c1));outline-offset:1px}

/* ── DESC BUTTON ── */
.btn-desc{
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  padding: 3px 8px;
  flex-shrink: 0;
  transition: all .15s;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1.5;
  opacity: 0.6;
}
.btn-desc:hover { opacity: 1; border-color: var(--fc, var(--c1)); color: var(--fc, var(--c1)); }
/* quando tem descrição: fica colorido, mais compacto, só ícone */
.btn-desc.has-desc {
  opacity: 1;
  border-color: var(--fc, var(--c1));
  color: var(--fc, var(--c1));
  background: transparent;
  padding: 3px 7px;
  font-size: 13px;
}

/* ── DESC MODAL ── */
.desc-overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,.55);z-index:600;align-items:flex-end;justify-content:center}
.desc-overlay.open{display:flex}
.desc-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:600px;
padding:28px 24px 44px;animation:slideUp .22s cubic-bezier(.3,1.3,.5,1);position:relative;max-height:80vh;overflow-y:auto}
.desc-sheet::before{content:'';display:block;width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 24px}
.desc-sheet-title{font-family:'Anybody',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.3px;margin-bottom:16px;color:var(--ink)}
.desc-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;
color:var(--muted);display:block;margin-bottom:6px}
.desc-textarea{width:100%;background:var(--soft);border:1.5px solid var(--border);border-radius:12px;
font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--ink);outline:none;
padding:14px;resize:vertical;min-height:120px;transition:border-color .15s;line-height:1.6}
.desc-textarea:focus{border-color:var(--ink)}
.desc-textarea::placeholder{color:var(--muted)}
.desc-footer{display:flex;gap:10px;margin-top:16px}
.btn-desc-cancel{flex:1;background:var(--soft);border:1.5px solid var(--border);border-radius:12px;
font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:15px;padding:13px;cursor:pointer;color:var(--muted);min-height:48px}
.btn-desc-save{flex:2;background:var(--ink);color:#fff;border:none;border-radius:12px;
font-family:'Anybody',sans-serif;font-weight:700;font-size:18px;padding:13px;cursor:pointer;min-height:48px}
.btn-desc-save:active{background:var(--c1)}
.btn-close-desc{position:absolute;top:20px;right:20px;background:var(--soft);border:none;border-radius:50%;
width:36px;height:36px;font-size:16px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}

/* ══════════════════════════
   FRENTE CARD
══════════════════════════ */
.frente-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;
margin-bottom:20px;overflow:hidden;transition:box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.frente-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.08)}
.frente-card::before{content:'';display:block;height:5px;background:var(--fc,var(--c1));border-radius:20px 20px 0 0}

.frente-header{display:flex;align-items:center;gap:14px;padding:18px 18px 14px}
.frente-info{flex:1;min-width:0}
.frente-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.frente-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.frente-editable{font-family:'Anybody',sans-serif;font-weight:700;font-size:clamp(18px,4.5vw,24px);letter-spacing:-.3px;line-height:1.2}

.frente-caret{font-size:20px;color:var(--muted);transition:transform .28s cubic-bezier(.4,0,.2,1);flex-shrink:0;cursor:pointer;padding:4px}
.frente-caret.open{transform:rotate(180deg)}
.frente-del{background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);
font-size:14px;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.frente-del:active{border-color:var(--c7);color:var(--c7)}

.frente-body{display:none;padding:0 18px 22px}
.frente-body.open{display:block}

/* desc-preview removido — descrição só abre no sheet */

/* ══════════════════════════
   NÍVEL 2 — TRILHA
   Card com fundo colorido tênue, borda esquerda grossa,
   título grande. Claramente um "bloco" importante.
══════════════════════════ */
.trilhas-list{display:flex;flex-direction:column;gap:16px;margin-top:12px}

.trilha-card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-left:4px solid var(--fc,var(--c1));
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}

.trilha-header{display:flex;align-items:center;gap:14px;padding:16px 16px 14px;cursor:pointer;
  background: linear-gradient(90deg, color-mix(in srgb, var(--fc,var(--c1)) 8%, transparent), transparent 60%);
}

/* Trilha ring — maior, mais proeminente */
.trilha-ring{flex-shrink:0;position:relative;width:52px;height:52px}
.trilha-ring svg{display:block}
.trilha-ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:0}
.trilha-ring-pct{font-family:'Anybody',sans-serif;font-weight:900;font-size:13px;color:var(--ink);line-height:1}
.trilha-ring-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:1px}
.trilha-ring.all-done .trilha-ring-pct{display:none}
.trilha-ring.all-done .trilha-ring-sub{display:none}
.trilha-ring-check{font-size:16px;display:none}
.trilha-ring.all-done .trilha-ring-check{display:block}

.trilha-info{flex:1;min-width:0}
.trilha-tag{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--fc,var(--c1));margin-bottom:4px;font-weight:500;
}
.trilha-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* Trilha name — maior e mais bold que etapa */
.trilha-editable{
  font-family:'Anybody',sans-serif;font-weight:900;
  font-size:clamp(17px,4vw,21px);
  letter-spacing:-.4px;line-height:1.15;color:var(--ink);
}

.trilha-caret{font-size:16px;color:var(--muted);transition:transform .25s;flex-shrink:0;padding:6px}
.trilha-caret.open{transform:rotate(180deg)}
.trilha-del{background:none;border:1.5px solid var(--border);border-radius:7px;color:var(--muted);
font-size:13px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.trilha-del:active{border-color:var(--c7);color:var(--c7)}

.trilha-body{display:none;padding:4px 16px 18px;border-top:1px solid var(--border)}
.trilha-body.open{display:block}

/* ══════════════════════════
   NÍVEL 3 — ETAPA
   Linha compacta, sem card. Fica dentro da trilha.
   Ícone menor, fonte menor, sem fundo próprio.
══════════════════════════ */
.etapas-list{display:flex;flex-direction:column;gap:0;margin-top:8px}

.etapa-wrap{position:relative}
/* linha vertical conectora */
.etapa-wrap::before{
  content:'';position:absolute;
  left:19px;top:46px;bottom:-2px;
  width:1.5px;background:var(--border);z-index:0;
}
.etapa-wrap:last-child::before{display:none}
.etapa-wrap.done::before{background:color-mix(in srgb,var(--fc,var(--c1)) 50%,transparent)}

.etapa-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 8px 8px 0;position:relative;z-index:1;
  border-radius:10px;transition:background .15s;cursor:pointer;
}
.etapa-row:hover{background:var(--soft)}

/* Etapa ring — menor que trilha */
.etapa-ring{flex-shrink:0;position:relative;width:40px;height:40px}
.etapa-ring svg{display:block}
.etapa-ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.etapa-ring-pct{font-family:'Anybody',sans-serif;font-weight:700;font-size:9px;color:var(--muted)}
.etapa-ring.all-done .etapa-ring-pct{display:none}
.etapa-ring-check2{font-size:11px;display:none}
.etapa-ring.all-done .etapa-ring-check2{display:block}

.etapa-info{flex:1;min-width:0}
.etapa-tag{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);margin-bottom:1px;
}
.etapa-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
/* Etapa name — menor e menos bold que trilha */
.etapa-editable{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;
  font-size:clamp(13px,3.2vw,15px);
  line-height:1.3;color:var(--ink);
}
.etapa-wrap.done .etapa-editable{color:var(--muted);text-decoration:line-through}
.etapa-sub-hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:1px}

.etapa-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* Caret grande e sempre visível — é o principal convite ao clique */
.etapa-caret{
  font-size:18px;color:var(--muted);
  transition:transform .22s;flex-shrink:0;
  padding:6px;cursor:pointer;
  background:var(--soft);border-radius:8px;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
}
.etapa-caret.open{transform:rotate(180deg);background:var(--border)}

/* Botão deletar — sempre visível no mobile */
.btn-sm{background:none;border:1.5px solid var(--border);border-radius:6px;color:var(--muted);
font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;cursor:pointer;transition:all .15s;min-height:32px}
.btn-sm:active{border-color:var(--c7);color:var(--c7);background:rgba(230,57,70,.06)}

/* ── SUBETAPAS PANEL ── */
.subetapas-panel{display:none;margin:0 0 8px 58px;background:var(--card);border-radius:12px;
padding:10px 12px;border:1.5px solid var(--border);animation:fadeDown .18s ease}
.subetapas-panel.open{display:block}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.sub-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.sub-item:last-of-type{border-bottom:none}
.sub-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--soft);
cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s}
.sub-check.done{background:var(--fc,var(--c1));border-color:var(--fc,var(--c1))}
.sub-check.done::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.sub-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:28px;flex-shrink:0}

.sub-name-row{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.sub-editable{font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;color:var(--ink)}
.sub-item.done .sub-editable{color:var(--muted);text-decoration:line-through}

.sub-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;
min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0}
.sub-del:active{color:var(--c7);background:#fee}

/* add subetapa */
.add-sub-row{display:flex;align-items:center;gap:8px;padding:10px 0 2px}
.ghost-check{width:22px;height:22px;border-radius:50%;border:2px dashed var(--border);flex-shrink:0}
.sub-inp{flex:1;background:none;border:none;border-bottom:1.5px solid var(--border);
font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;
padding:4px 0;min-width:0;transition:border-color .15s}
.sub-inp::placeholder{color:var(--muted)}
.sub-inp:focus{border-color:var(--fc,var(--c1))}
.btn-add-sub{background:var(--fc,var(--c1));color:#fff;border:none;border-radius:8px;
font-family:'Anybody',sans-serif;font-weight:700;font-size:15px;
width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.btn-add-sub:active{opacity:.75}

/* ── ADD TRILHA / ETAPA ── */
.btn-add-row{display:flex;align-items:center;gap:10px;width:100%;margin-top:12px;
background:transparent;border:1.5px dashed var(--border);border-radius:12px;
padding:12px 14px;cursor:pointer;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;
font-size:14px;transition:all .2s;min-height:46px}
.btn-add-row:active{border-color:var(--fc,var(--c1));color:var(--fc,var(--c1))}
.add-plus{width:22px;height:22px;border-radius:50%;border:1.5px dashed var(--border);
display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

.input-row{display:none;align-items:center;gap:8px;margin-top:10px;padding:12px 14px;
background:var(--soft);border-radius:12px;border:1.5px solid var(--fc,var(--c1))}
.input-row.open{display:flex}
.input-num{font-family:'Anybody',sans-serif;font-weight:700;font-size:16px;color:var(--muted);flex-shrink:0;min-width:20px}
.input-field{flex:1;background:none;border:none;border-bottom:1.5px solid var(--fc,var(--c1));
font-family:'Anybody',sans-serif;font-weight:700;font-size:17px;color:var(--ink);outline:none;padding:4px 0;min-width:0}
.input-field::placeholder{color:var(--border)}
.btn-ok{background:var(--ink);color:#fff;border:none;border-radius:8px;
font-family:'Anybody',sans-serif;font-weight:700;font-size:14px;
padding:8px 16px;cursor:pointer;flex-shrink:0;min-height:36px;transition:background .15s}
.btn-ok:active{background:var(--fc,var(--c1))}
.btn-x2{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;
padding:4px 6px;min-height:36px;display:flex;align-items:center}

/* ══════════════════════════
   NEW FRENTE MODAL
══════════════════════════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,.6);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:600px;
padding:32px 24px 44px;animation:slideUp .25s cubic-bezier(.3,1.3,.5,1);position:relative;max-height:95vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal::before{content:'';display:block;width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 28px}
.modal-title{font-family:'Anybody',sans-serif;font-weight:900;font-size:32px;letter-spacing:-1px;margin-bottom:28px;color:var(--ink)}
.modal-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:8px}
.modal-inp{width:100%;background:var(--soft);border:1.5px solid var(--border);border-radius:12px;
font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;color:var(--ink);outline:none;
padding:14px 16px;margin-bottom:24px;transition:border-color .15s}
.modal-inp:focus{border-color:var(--ink)}
.modal-inp::placeholder{color:var(--muted)}
.color-pick{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:32px}
.csw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.csw.sel{border-color:var(--ink);transform:scale(1.18)}
.modal-footer{display:flex;gap:10px}
.btn-cancel-m{flex:1;background:var(--soft);border:1.5px solid var(--border);border-radius:12px;
font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:15px;padding:14px;cursor:pointer;color:var(--muted);min-height:50px}
.btn-create-m{flex:2;background:var(--ink);color:#fff;border:none;border-radius:12px;
font-family:'Anybody',sans-serif;font-weight:700;font-size:18px;letter-spacing:.3px;padding:14px;cursor:pointer;min-height:50px}
.btn-create-m:active{background:var(--c1)}
.btn-close-m{position:absolute;top:20px;right:20px;background:var(--soft);border:none;border-radius:50%;
width:36px;height:36px;font-size:16px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}

/* ── COLOR POPOVER ── */
.color-popover{
  position:fixed;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:16px;
  padding:14px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  z-index:1000;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
  animation:fadeDown .15s ease;
  width:192px;
}
.color-popover .csw2{
  width:32px;height:32px;border-radius:50%;
  cursor:pointer;border:2.5px solid transparent;
  transition:all .15s;
}
.color-popover .csw2:hover{ transform:scale(1.15); }
.color-popover .csw2.sel{ border-color:var(--ink);transform:scale(1.18); }

/* ── DESKTOP ── */
@media(min-width:680px){
  header{padding:16px 32px}
  .logo{font-size:30px}
  main{padding:40px 32px 100px}
  .frente-header{padding:22px 22px 18px}
  .frente-body{padding:0 22px 24px}
  .overlay,.desc-overlay{align-items:center}
  .modal,.desc-sheet{border-radius:24px;max-width:480px;padding:36px;animation:modalPop .22s cubic-bezier(.3,1.3,.5,1)}
  .modal::before,.desc-sheet::before{display:none}
  @keyframes modalPop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .frente-del{opacity:0;transition:opacity .2s,border-color .15s,color .15s}
  .frente-card:hover .frente-del{opacity:1}
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>Frentes de Trabalho</div>
  <button class="btn-new" onclick="openModal()">+ Nova Frente</button>
</header>

<main>
  <div id="empty" class="empty">
    <div class="empty-big">0%</div>
    <div class="empty-sub">Nenhuma frente ainda.<br><strong>+ Nova Frente</strong> para começar.</div>
  </div>
  <div id="wrap"></div>
</main>

<!-- New frente modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="btn-close-m" onclick="closeModal()">✕</button>
    <div class="modal-title">Nova Frente</div>
    <label class="modal-label">Nome da frente</label>
    <input class="modal-inp" id="modal-inp" placeholder="Ex: Financeira, Saúde, Carreira…"
      onkeydown="if(event.key==='Enter')createFrente();if(event.key==='Escape')closeModal()"/>
    <label class="modal-label">Cor</label>
    <div class="color-pick" id="color-pick"></div>
    <div class="modal-footer">
      <button class="btn-cancel-m" onclick="closeModal()">Cancelar</button>
      <button class="btn-create-m" onclick="createFrente()">Criar Frente</button>
    </div>
  </div>
</div>

<!-- Description sheet -->
<div class="desc-overlay" id="desc-overlay">
  <div class="desc-sheet">
    <button class="btn-close-desc" onclick="closeDesc()">✕</button>
    <span class="desc-tag" id="desc-tag">Descrição</span>
    <div class="desc-sheet-title" id="desc-sheet-title"></div>
    <textarea class="desc-textarea" id="desc-textarea" placeholder="Adicione uma descrição…" rows="5"></textarea>
    <div class="desc-footer">
      <button class="btn-desc-cancel" onclick="closeDesc()">Cancelar</button>
      <button class="btn-desc-save" onclick="saveDesc()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
//  DATA
// ═══════════════════════════════════
let data = JSON.parse(localStorage.getItem('etapas_v2') || '[]');
let picked = '#ff5c3a';
let openSubs = {}; // "pi-ti-mi" => bool

const COLORS = [
  '#ff5c3a','#ff9500','#ffd60a','#34c759',
  '#00c7be','#32ade6','#3a7bff','#9b5de5',
  '#e63946','#ff2d92','#8e4585','#5e4b2b',
  '#404040','#6e6e73','#1a7060','#2d5f2d'
];

function save(){ localStorage.setItem('etapas_v2', JSON.stringify(data)); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════
//  RING SVG
// ═══════════════════════════════════
function ring(size, stroke, pct, color, bg){
  const r = (size-stroke)/2;
  const c = 2*Math.PI*r;
  const d = (pct/100)*c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${bg}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${d} ${c}" stroke-dashoffset="${c/4}" stroke-linecap="round"
      style="transition:stroke-dasharray .5s cubic-bezier(.4,0,.2,1)"/>
  </svg>`;
}

// ═══════════════════════════════════
//  PROGRESS CALC
// ═══════════════════════════════════
function etapaPct(e){
  if(!e.subs||e.subs.length===0) return e.done?100:0;
  return Math.round(e.subs.filter(s=>s.done).length/e.subs.length*100);
}
function trilhaPct(t){
  if(!t.etapas||t.etapas.length===0) return 0;
  return Math.round(t.etapas.reduce((s,e)=>s+etapaPct(e),0)/t.etapas.length);
}
// Frente não tem percentual — é uma área de trabalho contínua

// ═══════════════════════════════════
//  RENDER
// ═══════════════════════════════════
function render(){
  const wrap=document.getElementById('wrap');
  const empty=document.getElementById('empty');
  empty.style.display=data.length===0?'block':'none';
  wrap.innerHTML='';
  data.forEach((f,pi)=>{
    const div=document.createElement('div');
    div.className='frente-card';
    div.style.setProperty('--fc',f.color);
    div.innerHTML=renderFrente(f,pi);
    wrap.appendChild(div);
  });
}

// ── FRENTE ──────────────────────────────
function renderFrente(f,pi){
  const trilhasTotal=f.trilhas?f.trilhas.length:0;
  const trilhasDone=f.trilhas?f.trilhas.filter(t=>trilhaPct(t)===100).length:0;

  const trilhasHtml=f.trilhas&&f.trilhas.length>0
    ?f.trilhas.map((t,ti)=>renderTrilha(f,pi,t,ti)).join('')
    :`<div style="padding:12px 0;font-size:14px;color:var(--muted);font-style:italic">Nenhuma trilha ainda.</div>`;

  const descBtn=`<button class="btn-desc ${f.desc?'has-desc':''}" onclick="openDesc('f',${pi},-1,-1)" title="${f.desc?'Ver/editar descrição':'Adicionar descrição'}">${f.desc?'📋':'desc'}</button>`;

  // Ícone colorido — clique abre picker de cor, não toggle
  const icon=`<div onclick="event.stopPropagation();openColorPicker(${pi},this)" style="
    width:52px;height:52px;border-radius:14px;background:${f.color};
    flex-shrink:0;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1px;user-select:none;
    position:relative;transition:opacity .15s;"
    title="Clique para mudar a cor">
    <span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#fff;line-height:1">${trilhasTotal}</span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.08em">trilha${trilhasTotal!==1?'s':''}</span>
    <span style="position:absolute;bottom:4px;right:5px;font-size:9px;opacity:.7">🎨</span>
  </div>`;

  return `
    <div class="frente-header" onclick="toggleFrente(${pi})" style="cursor:pointer">
      ${icon}
      <div class="frente-info" style="flex:1;min-width:0">
        <div class="frente-tag">Frente ${pi+1}</div>
        <div class="frente-name-row">
          <div class="editable-wrap" style="--fc:${f.color}">
            <input class="editable-name frente-editable" value="${esc(f.name)}"
              onblur="saveName('f',${pi},-1,-1,this.value)"
              onkeydown="if(event.key==='Enter')this.blur()"
              onclick="event.stopPropagation()" title="Clique para editar"/>
            <span onclick="event.stopPropagation()">${descBtn}</span>
          </div>
        </div>
      </div>
      <button class="frente-del" onclick="event.stopPropagation();deleteFrente(${pi})" title="Deletar frente">🗑</button>
      <div class="frente-caret ${f.open?'open':''}">⌄</div>
    </div>

    <div class="frente-body ${f.open?'open':''}" id="fb-${pi}">
      <div class="trilhas-list">${trilhasHtml}</div>

      <button class="btn-add-row" onclick="showAddTrilha(${pi})" style="--fc:${f.color}">
        <div class="add-plus">+</div> Adicionar trilha
      </button>
      <div class="input-row" id="atr-${pi}" style="--fc:${f.color}">
        <span class="input-num">${trilhasTotal+1}</span>
        <input class="input-field" id="ati-${pi}" placeholder="NOME DA TRILHA…"
          onkeydown="if(event.key==='Enter')confirmTrilha(${pi});if(event.key==='Escape')cancelAdd('atr-${pi}','ati-${pi}')"/>
        <button class="btn-ok" onclick="confirmTrilha(${pi})">OK</button>
        <button class="btn-x2" onclick="cancelAdd('atr-${pi}','ati-${pi}')">✕</button>
      </div>
    </div>`;
}

// ── TRILHA ──────────────────────────────
function renderTrilha(f,pi,t,ti){
  const pct=trilhaPct(t);
  const etsDone=t.etapas?t.etapas.filter(e=>etapaPct(e)===100).length:0;
  const etsTotal=t.etapas?t.etapas.length:0;
  const trilhaRing=ring(52,6,pct,f.color,'#e2ddd3');
  const allDone=pct===100?'all-done':'';

  const etapasHtml=t.etapas&&t.etapas.length>0
    ?t.etapas.map((e,mi)=>renderEtapa(f,pi,t,ti,e,mi)).join('')
    :`<div style="padding:10px 0;font-size:13px;color:var(--muted);font-style:italic">Nenhuma etapa ainda.</div>`;

  const descBtn=`<button class="btn-desc ${t.desc?'has-desc':''}" onclick="event.stopPropagation();openDesc('t',${pi},${ti},-1)" title="${t.desc?'Ver/editar descrição':'Adicionar descrição'}">${t.desc?'📋':'desc'}</button>`;

  return `
    <div class="trilha-card" id="tc-${pi}-${ti}" style="--fc:${f.color}">
      <div class="trilha-header" onclick="toggleTrilha(${pi},${ti})">
        <div class="trilha-ring ${allDone}" style="flex-shrink:0;position:relative;width:52px;height:52px">
          ${trilhaRing}
          <div class="trilha-ring-label">
            <span class="trilha-ring-pct">${pct}%</span>
            <span class="trilha-ring-sub">${etsDone}/${etsTotal}</span>
            <span class="trilha-ring-check">✓</span>
          </div>
        </div>
        <div class="trilha-info" style="flex:1;min-width:0">
          <div class="trilha-tag">— Trilha ${ti+1}</div>
          <div class="trilha-name-row">
            <div class="editable-wrap" style="--fc:${f.color}">
              <input class="editable-name trilha-editable" value="${esc(t.name)}"
                onblur="saveName('t',${pi},${ti},-1,this.value)"
                onkeydown="if(event.key==='Enter')this.blur()"
                onclick="event.stopPropagation()" title="Clique para editar"/>
              <span onclick="event.stopPropagation()">${descBtn}</span>
            </div>
          </div>
        </div>
        <button class="trilha-del" onclick="event.stopPropagation();deleteTrilha(${pi},${ti})" title="Deletar trilha">🗑</button>
        <div class="trilha-caret ${t.open?'open':''}">⌄</div>
      </div>

      <div class="trilha-body ${t.open?'open':''}" id="tb-${pi}-${ti}">
        <div class="etapas-list">${etapasHtml}</div>

        <button class="btn-add-row" onclick="showAddEtapa(${pi},${ti})" style="margin-top:10px;--fc:${f.color}">
          <div class="add-plus">+</div> Adicionar etapa
        </button>
        <div class="input-row" id="aer-${pi}-${ti}" style="--fc:${f.color}">
          <span class="input-num">${etsTotal+1}</span>
          <input class="input-field" id="aei-${pi}-${ti}" placeholder="NOME DA ETAPA…"
            onkeydown="if(event.key==='Enter')confirmEtapa(${pi},${ti});if(event.key==='Escape')cancelAdd('aer-${pi}-${ti}','aei-${pi}-${ti}')"/>
          <button class="btn-ok" onclick="confirmEtapa(${pi},${ti})">OK</button>
          <button class="btn-x2" onclick="cancelAdd('aer-${pi}-${ti}','aei-${pi}-${ti}')">✕</button>
        </div>
      </div>
    </div>`;
}

// ── ETAPA ──────────────────────────────
function renderEtapa(f,pi,t,ti,e,mi){
  const pct=etapaPct(e);
  const isDone=pct===100;
  const subTotal=e.subs?e.subs.length:0;
  const subDone=e.subs?e.subs.filter(s=>s.done).length:0;
  const subKey=`${pi}-${ti}-${mi}`;
  const subsOpen=openSubs[subKey]||false;
  const miniRing=ring(40,4,pct,f.color,'#e8e2d8');
  const allDone=isDone?'all-done':'';

  const subsHtml=e.subs&&e.subs.length>0
    ?e.subs.map((s,si)=>renderSubetapa(f,pi,ti,mi,s,si)).join(''):'';

  const descBtn=`<button class="btn-desc ${e.desc?'has-desc':''}" onclick="event.stopPropagation();openDesc('e',${pi},${ti},${mi})" title="${e.desc?'Ver/editar descrição':'Adicionar descrição'}">${e.desc?'📋':'desc'}</button>`;

  return `
    <div class="etapa-wrap ${isDone?'done':''}" id="ew-${pi}-${ti}-${mi}">
      <div class="etapa-row" onclick="toggleSubs(${pi},${ti},${mi})">
        <div class="etapa-ring ${allDone}" style="--fc:${f.color};width:40px;height:40px;cursor:pointer;flex-shrink:0"
          onclick="event.stopPropagation();toggleEtapaDone(${pi},${ti},${mi})" title="Clique para marcar concluída">
          ${miniRing}
          <div class="etapa-ring-label">
            <span class="etapa-ring-pct">${pct}%</span>
            <span class="etapa-ring-check2">✓</span>
          </div>
        </div>
        <div class="etapa-info" style="flex:1;min-width:0">
          <div class="etapa-tag">etapa ${mi+1}</div>
          <div class="etapa-name-row">
            <div class="editable-wrap" style="--fc:${f.color}">
              <input class="editable-name etapa-editable" value="${esc(e.name)}"
                onblur="saveName('e',${pi},${ti},${mi},this.value)"
                onkeydown="if(event.key==='Enter')this.blur()"
                onclick="event.stopPropagation()" title="Clique para editar"/>
              <span onclick="event.stopPropagation()">${descBtn}</span>
            </div>
          </div>
          ${subTotal>0?`<div class="etapa-sub-hint">${subDone}/${subTotal} subetapas</div>`:''}
        </div>
        <div class="etapa-actions" onclick="event.stopPropagation()">
          <button class="btn-sm" onclick="deleteEtapa(${pi},${ti},${mi})">✕</button>
          <div class="etapa-caret ${subsOpen?'open':''}">⌄</div>
        </div>
      </div>

      <div class="subetapas-panel ${subsOpen?'open':''}" id="sp-${pi}-${ti}-${mi}" style="--fc:${f.color}">
        <div id="subs-inner-${pi}-${ti}-${mi}">${subsHtml}</div>
        <div class="add-sub-row">
          <div class="ghost-check"></div>
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:28px;flex-shrink:0">${mi+1}.${subTotal+1}</span>
          <input class="sub-inp" id="si-${pi}-${ti}-${mi}" placeholder="Nova subetapa…"
            onkeydown="if(event.key==='Enter')confirmSub(${pi},${ti},${mi})"/>
          <button class="btn-add-sub" onclick="confirmSub(${pi},${ti},${mi})" style="background:${f.color}">+</button>
        </div>
      </div>
    </div>`;
}

// ── SUBETAPA ──────────────────────────────
function renderSubetapa(f,pi,ti,mi,s,si){
  const descBtn=`<button class="btn-desc ${s.desc?'has-desc':''}"
    onclick="event.stopPropagation();openDesc('s',${pi},${ti*1000+mi},${si})"
    title="${s.desc?'Ver/editar descrição':'Adicionar descrição'}">${s.desc?'📋':'desc'}</button>`;
  return `
    <div class="sub-item ${s.done?'done':''}">
      <div class="sub-check ${s.done?'done':''}" onclick="toggleSub(${pi},${ti},${mi},${si})"></div>
      <span class="sub-num">${mi+1}.${si+1}</span>
      <div class="sub-name-row">
        <input class="editable-name sub-editable ${s.done?'done':''}" value="${esc(s.name)}"
          onblur="saveName('s',${pi},${ti*1000+mi},${si},this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
          onclick="event.stopPropagation()" title="Clique para editar"/>
        ${descBtn}
      </div>
      <button class="sub-del" onclick="deleteSub(${pi},${ti},${mi},${si})">✕</button>
    </div>`;
}

// ═══════════════════════════════════
//  DESCRIPTION SHEET
// ═══════════════════════════════════
let descCtx = null; // {type, pi, ti, mi, si}

function openDesc(type, pi, ti, mi){
  const titles = {f:'Frente', t:'Trilha', e:'Etapa', s:'Subetapa'};
  let item, name;
  if(type==='f'){ item=data[pi]; name=item.name; }
  else if(type==='t'){ item=data[pi].trilhas[ti]; name=item.name; }
  else if(type==='e'){ item=data[pi].trilhas[ti].etapas[mi]; name=item.name; }
  else if(type==='s'){
    // mi encodes ti*1000+realMi for subetapas
    const realTi=Math.floor(ti/1000); const realMi=ti%1000;
    item=data[pi].trilhas[realTi].etapas[realMi].subs[mi]; name=item.name;
    ti=realTi; // normalize
    descCtx={type,pi,ti:realTi,mi:realMi,si:mi};
    // override below
    document.getElementById('desc-tag').textContent=titles[type];
    document.getElementById('desc-sheet-title').textContent=name;
    document.getElementById('desc-textarea').value=item.desc||'';
    document.getElementById('desc-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('desc-textarea').focus(),80);
    return;
  }
  descCtx={type,pi,ti,mi,si:-1};
  document.getElementById('desc-tag').textContent=titles[type];
  document.getElementById('desc-sheet-title').textContent=name;
  document.getElementById('desc-textarea').value=item.desc||'';
  document.getElementById('desc-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('desc-textarea').focus(),80);
}

function closeDesc(){
  document.getElementById('desc-overlay').classList.remove('open');
  descCtx=null;
}

function saveDesc(){
  if(!descCtx) return;
  const val=document.getElementById('desc-textarea').value.trim();
  const {type,pi,ti,mi,si}=descCtx;
  if(type==='f') data[pi].desc=val;
  else if(type==='t') data[pi].trilhas[ti].desc=val;
  else if(type==='e') data[pi].trilhas[ti].etapas[mi].desc=val;
  else if(type==='s') data[pi].trilhas[ti].etapas[mi].subs[si].desc=val;
  save(); render(); closeDesc();
}

document.getElementById('desc-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('desc-overlay')) closeDesc();
});

// ═══════════════════════════════════
//  INLINE NAME EDIT
// ═══════════════════════════════════
function saveName(type,pi,ti,mi,val){
  val=val.trim();
  if(!val) return render(); // revert if empty
  if(type==='f') data[pi].name=val;
  else if(type==='t') data[pi].trilhas[ti].name=val;
  else if(type==='e') data[pi].trilhas[ti].etapas[mi].name=val;
  else if(type==='s'){
    const realTi=Math.floor(ti/1000); const realMi=ti%1000;
    data[pi].trilhas[realTi].etapas[realMi].subs[mi].name=val;
  }
  save(); render();
}

// ═══════════════════════════════════
//  TOGGLE ACTIONS
// ═══════════════════════════════════
function toggleFrente(pi){ data[pi].open=!data[pi].open; save(); render(); }
function toggleTrilha(pi,ti){ data[pi].trilhas[ti].open=!data[pi].trilhas[ti].open; save(); render(); }

// Clique na roda da etapa marca/desmarca concluída diretamente
function toggleEtapaDone(pi,ti,mi){
  const e=data[pi].trilhas[ti].etapas[mi];
  e.done=!e.done;
  // se marcou como feita, marca todas as subs também; se desmarcou, limpa
  if(e.subs&&e.subs.length>0) e.subs.forEach(s=>s.done=e.done);
  save(); render();
}
function toggleSubs(pi,ti,mi){
  const k=`${pi}-${ti}-${mi}`; openSubs[k]=!openSubs[k]; render();
  setTimeout(()=>{ const el=document.getElementById(`sp-${pi}-${ti}-${mi}`); if(el&&openSubs[k]) el.scrollIntoView({behavior:'smooth',block:'nearest'}); },60);
}

function toggleSub(pi,ti,mi,si){
  data[pi].trilhas[ti].etapas[mi].subs[si].done=!data[pi].trilhas[ti].etapas[mi].subs[si].done;
  const all=data[pi].trilhas[ti].etapas[mi].subs.every(s=>s.done);
  data[pi].trilhas[ti].etapas[mi].done=all;
  save(); render();
  setTimeout(()=>{ const i=document.getElementById(`si-${pi}-${ti}-${mi}`); if(i) i.focus(); },50);
}

// ═══════════════════════════════════
//  DELETE
// ═══════════════════════════════════
function deleteFrente(pi){ if(!confirm(`Deletar "${data[pi].name}"?`)) return; data.splice(pi,1); save(); render(); }
function deleteTrilha(pi,ti){ data[pi].trilhas.splice(ti,1); save(); render(); }
function deleteEtapa(pi,ti,mi){ data[pi].trilhas[ti].etapas.splice(mi,1); save(); render(); }
function deleteSub(pi,ti,mi,si){ data[pi].trilhas[ti].etapas[mi].subs.splice(si,1); save(); render(); }

// ═══════════════════════════════════
//  ADD
// ═══════════════════════════════════
function cancelAdd(rowId,inpId){
  const r=document.getElementById(rowId); if(r) r.classList.remove('open');
  const i=document.getElementById(inpId); if(i) i.value='';
}

function showAddTrilha(pi){
  const r=document.getElementById(`atr-${pi}`); if(r){ r.classList.add('open'); document.getElementById(`ati-${pi}`).focus(); }
}
function confirmTrilha(pi){
  const inp=document.getElementById(`ati-${pi}`); const name=inp?inp.value.trim():''; if(!name) return;
  data[pi].trilhas.push({name,desc:'',open:true,etapas:[]});
  save(); render(); setTimeout(()=>showAddTrilha(pi),50);
}

function showAddEtapa(pi,ti){
  const r=document.getElementById(`aer-${pi}-${ti}`); if(r){ r.classList.add('open'); document.getElementById(`aei-${pi}-${ti}`).focus(); }
}
function confirmEtapa(pi,ti){
  const inp=document.getElementById(`aei-${pi}-${ti}`); const name=inp?inp.value.trim():''; if(!name) return;
  data[pi].trilhas[ti].etapas.push({name,desc:'',done:false,subs:[]});
  save(); render(); setTimeout(()=>showAddEtapa(pi,ti),50);
}

function confirmSub(pi,ti,mi){
  const inp=document.getElementById(`si-${pi}-${ti}-${mi}`); const name=inp?inp.value.trim():''; if(!name) return;
  data[pi].trilhas[ti].etapas[mi].subs.push({name,desc:'',done:false});
  openSubs[`${pi}-${ti}-${mi}`]=true;
  save(); render();
  setTimeout(()=>{ const i=document.getElementById(`si-${pi}-${ti}-${mi}`); if(i) i.focus(); },50);
}

// ═══════════════════════════════════
//  COLOR PICKER POPOVER (frente icon)
// ═══════════════════════════════════
let colorPopoverPi = null;

function openColorPicker(pi, anchorEl){
  closeColorPicker();
  colorPopoverPi = pi;

  const pop = document.createElement('div');
  pop.className = 'color-popover';
  pop.id = 'color-popover';

  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'csw2' + (c === data[pi].color ? ' sel' : '');
    sw.style.background = c;
    sw.onclick = (e) => {
      e.stopPropagation();
      data[pi].color = c;
      save(); render();
      closeColorPicker();
    };
    pop.appendChild(sw);
  });

  document.body.appendChild(pop);

  // Position below the icon using fixed coords
  const rect = anchorEl.getBoundingClientRect();
  const popW = 192, popH = 152;
  let top = rect.bottom + 8;
  let left = rect.left;
  // Keep within viewport
  if(left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  if(top + popH > window.innerHeight - 8) top = rect.top - popH - 8;
  pop.style.top  = top  + 'px';
  pop.style.left = left + 'px';

  setTimeout(() => {
    document.addEventListener('click', closeColorPicker, {once:true});
  }, 0);
}

function closeColorPicker(){
  const pop = document.getElementById('color-popover');
  if(pop) pop.remove();
  colorPopoverPi = null;
}

// ═══════════════════════════════════
//  NEW FRENTE MODAL
// ═══════════════════════════════════
function openModal(){ document.getElementById('overlay').classList.add('open'); setTimeout(()=>document.getElementById('modal-inp').focus(),80); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); document.getElementById('modal-inp').value=''; }
function createFrente(){
  const name=document.getElementById('modal-inp').value.trim(); if(!name){ document.getElementById('modal-inp').focus(); return; }
  data.push({name,desc:'',color:picked,open:true,trilhas:[]});
  save(); render(); closeModal();
}
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay')) closeModal(); });

// Color picker
(function(){
  const row=document.getElementById('color-pick');
  COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='csw'+(c===picked?' sel':'');
    sw.style.background=c;
    sw.onclick=()=>{ picked=c; document.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel')); sw.classList.add('sel'); };
    row.appendChild(sw);
  });
})();

render();
